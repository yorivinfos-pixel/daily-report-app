<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7c3aed">
    <title>YoRivSiteTrack-YST1 | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .admin-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
        .admin-header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 1.5rem 2rem;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
            border-bottom: 2px solid #7c3aed;
        }
        .admin-header h1 { color: #fff; font-size: 1.4rem; margin: 0; }
        .admin-header .admin-user { color: #c4b5fd; font-size: 0.9rem; }
        .admin-header button { background: rgba(220,38,38,0.2); color: #fca5a5; border: 1px solid rgba(220,38,38,0.3);
            padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .admin-header button:hover { background: rgba(220,38,38,0.4); color: #fff; }

        .section { background: linear-gradient(135deg, #1e293b 0%, #263248 100%);
            border-radius: 12px; padding: 1.5rem; margin: 1.5rem 0;
            border: 1px solid rgba(255,255,255,0.06); }
        .section h2 { color: #fff; font-size: 1.15rem; margin: 0 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
        .form-grid label { color: #94a3b8; font-size: 0.8rem; display: block; margin-bottom: 0.25rem; }
        .form-grid input, .form-grid select {
            width: 100%; padding: 0.6rem 0.8rem; background: #0f172a; border: 1px solid #475569;
            border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; box-sizing: border-box; }
        .form-grid input:focus, .form-grid select:focus { outline: none; border-color: #7c3aed; }
        .btn-add { grid-column: 1 / -1; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff;
            border: none; padding: 0.7rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; margin-top: 0.5rem; }
        .btn-add:hover { filter: brightness(1.15); }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        .users-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        .users-table th { text-align: left; color: #94a3b8; font-size: 0.8rem; padding: 0.6rem; border-bottom: 1px solid #334155; }
        .users-table td { padding: 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.88rem; }
        .users-table tr:hover { background: rgba(124,58,237,0.08); }
        .role-badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .role-admin { background: rgba(220,38,38,0.2); color: #fca5a5; }
        .role-group_pm { background: rgba(168,85,247,0.2); color: #d8b4fe; }
        .role-program_manager { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .role-pm { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .role-supervisor { background: rgba(5,150,105,0.2); color: #6ee7b7; }
        .status-active { color: #6ee7b7; }
        .status-inactive { color: #f87171; }
        .btn-sm { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.78rem; cursor: pointer; border: none; margin-right: 0.25rem; }
        .btn-toggle { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .btn-toggle:hover { background: rgba(245,158,11,0.4); }
        .btn-edit { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .btn-edit:hover { background: rgba(59,130,246,0.4); }
        .btn-del { background: rgba(220,38,38,0.15); color: #fca5a5; }
        .btn-del:hover { background: rgba(220,38,38,0.35); }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.8rem 1.2rem; border-radius: 8px;
            font-size: 0.9rem; z-index: 9999; animation: fadeIn 0.3s; }
        .toast.success { background: #065f46; color: #6ee7b7; }
        .toast.error { background: #7f1d1d; color: #fca5a5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

        .table-wrap { overflow-x: auto; }

        @media (max-width: 768px) {
            .admin-header { padding: 1rem; }
            .admin-header h1 { font-size: 1.1rem; }
            .form-grid { grid-template-columns: 1fr; }
            .admin-container { padding: 0.5rem; }
            .section { padding: 1rem; margin: 1rem 0; }
            .users-table { font-size: 0.82rem; }
            .users-table th, .users-table td { padding: 0.4rem 0.3rem; }
        }
    </style>
</head>
<body>
    <!-- Login Admin -->
    <div id="admin-login" class="admin-login">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon" style="font-size:3rem;display:block;">🔐</span>
                <h1>YoRivSiteTrack-YST1</h1>
                <p>Panneau de gestion des comptes</p>
            </div>
            <form id="admin-login-form" class="login-form">
                <div class="login-field">
                    <label for="admin-login-username">Identifiant</label>
                    <input type="text" id="admin-login-username" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="admin-login-password">Mot de passe</label>
                    <input type="password" id="admin-login-password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div id="admin-login-error" class="login-error" style="display:none;"></div>
                <button type="submit" class="login-btn" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);">Se connecter</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Admin -->
    <div id="admin-app" style="display:none;">
        <header class="admin-header">
            <div>
                <h1>🔐 YoRivSiteTrack-YST1 — Admin</h1>
                <span class="admin-user" id="admin-user-display"></span>
            </div>
            <div>
                <a href="/" style="color:#93c5fd;margin-right:1rem;text-decoration:none;font-size:0.85rem;">📱 App Superviseur</a>
                <a href="/pm.html" style="color:#c4b5fd;margin-right:1rem;text-decoration:none;font-size:0.85rem;">💻 Dashboard PM</a>
                <button type="button" id="admin-change-password-btn" style="background:rgba(59,130,246,0.25);color:#93c5fd;border:1px solid rgba(59,130,246,0.4);padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-size:0.85rem;margin-right:0.5rem;">🔑 Mon mot de passe</button>
                <button id="admin-logout-btn">⏻ Déconnexion</button>
            </div>
        </header>

        <div class="admin-container">
            <!-- Créer un compte -->
            <div class="section">
                <h2>➕ Créer un nouveau compte</h2>
                <form id="create-user-form" class="form-grid">
                    <div>
                        <label for="new-full-name">Nom complet</label>
                        <input type="text" id="new-full-name" placeholder="Ex: Grace NGOMBA" required>
                    </div>
                    <div>
                        <label for="new-username">Identifiant (login)</label>
                        <input type="text" id="new-username" placeholder="Ex: grace.ngomba" required>
                    </div>
                    <div>
                        <label for="new-password">Mot de passe</label>
                        <input type="password" id="new-password" placeholder="Min 6 caractères" required>
                    </div>
                    <div>
                        <label for="new-role">Rôle</label>
                        <select id="new-role" required>
                            <option value="">Choisir un rôle</option>
                            <option value="supervisor">Superviseur</option>
                            <option value="pm">Project Manager (PM)</option>
                            <option value="program_manager">Program Manager</option>
                            <option value="group_pm">Group PM</option>
                            <option value="admin">Administrateur</option>
                        </select>
                    </div>
                    <div>
                        <label for="new-zone">Zone (pour PM)</label>
                        <select id="new-zone">
                            <option value="">Aucune / Toutes</option>
                            <option value="Zone 1">Zone 1 (Kinshasa)</option>
                            <option value="Zone 2">Zone 2 (Katanga)</option>
                            <option value="Zone 3">Zone 3 (Kasaï)</option>
                            <option value="Zone 4">Zone 4 (Est)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-add" id="btn-create-user">Créer le compte</button>
                </form>
            </div>

            <!-- Liste des comptes -->
            <div class="section">
                <h2>👥 Comptes existants (<span id="user-count">0</span>)</h2>
                <div class="table-wrap">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Identifiant</th>
                                <th>Rôle</th>
                                <th>Zone</th>
                                <th>Statut</th>
                                <th>Dernière connexion</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // --- Modal helper to replace prompt() ---
        function modalPrompt(title, fields) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:center;justify-content:center;';
                const box = document.createElement('div');
                box.style.cssText = 'background:#1e293b;border:1px solid #475569;border-radius:12px;padding:1.5rem;min-width:320px;max-width:90vw;';
                box.innerHTML = `<h3 style="color:#fff;margin:0 0 1rem;">${title}</h3>`;
                const inputs = [];
                fields.forEach(f => {
                    const label = document.createElement('label');
                    label.style.cssText = 'color:#94a3b8;font-size:0.85rem;display:block;margin-bottom:0.25rem;';
                    label.textContent = f.label;
                    const input = document.createElement('input');
                    input.type = f.type || 'text';
                    input.placeholder = f.placeholder || '';
                    input.style.cssText = 'width:100%;padding:0.6rem 0.8rem;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:0.9rem;box-sizing:border-box;margin-bottom:0.75rem;';
                    box.appendChild(label);
                    box.appendChild(input);
                    inputs.push(input);
                });
                const btnRow = document.createElement('div');
                btnRow.style.cssText = 'display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;';
                const cancelBtn = document.createElement('button');
                cancelBtn.textContent = 'Annuler';
                cancelBtn.style.cssText = 'padding:0.5rem 1rem;border-radius:8px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;';
                const okBtn = document.createElement('button');
                okBtn.textContent = 'Valider';
                okBtn.style.cssText = 'padding:0.5rem 1rem;border-radius:8px;border:none;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;cursor:pointer;font-weight:600;';
                btnRow.appendChild(cancelBtn);
                btnRow.appendChild(okBtn);
                box.appendChild(btnRow);
                overlay.appendChild(box);
                document.body.appendChild(overlay);
                inputs[0]?.focus();
                cancelBtn.addEventListener('click', () => { overlay.remove(); resolve(null); });
                overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(null); } });
                okBtn.addEventListener('click', () => {
                    const values = inputs.map(i => i.value);
                    overlay.remove();
                    resolve(values.length === 1 ? values[0] : values);
                });
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { okBtn.click(); }
                    if (e.key === 'Escape') { cancelBtn.click(); }
                });
            });
        }
        const SERVER = window.location.origin;
        let token = localStorage.getItem('adminAuthToken') || null;
        let users = [];

        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }

        function showToast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        function showApp() {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-app').style.display = '';
            const user = JSON.parse(localStorage.getItem('adminCurrentUser') || '{}');
            document.getElementById('admin-user-display').textContent = `Connecté : ${user.full_name || user.username}`;
            loadUsers();
        }

        function logout() {
            token = null;
            localStorage.removeItem('adminAuthToken');
            localStorage.removeItem('adminCurrentUser');
            document.getElementById('admin-login').style.display = '';
            document.getElementById('admin-app').style.display = 'none';
        }

        /** Déconnexion si 401 sur les routes protégées (pas sur change-password = mauvais MDP actuel) */
        function handleSession401(res, requestUrl) {
            if (res.status !== 401) return false;
            if (requestUrl && requestUrl.includes('/api/auth/change-password')) return false;
            logout();
            const errEl = document.getElementById('admin-login-error');
            if (errEl) {
                errEl.textContent = 'Session expirée ou token invalide. Reconnectez-vous.';
                errEl.style.display = 'block';
            }
            showToast('Session expirée. Reconnectez-vous.', 'error');
            return true;
        }

        async function tryRestoreSession() {
            if (!token) return;
            try {
                const res = await fetch(`${SERVER}/api/auth/me`, { headers: authHeaders() });
                if (res.status === 401) {
                    logout();
                    const errEl = document.getElementById('admin-login-error');
                    if (errEl) {
                        errEl.textContent = 'Session expirée. Entrez à nouveau identifiant et mot de passe.';
                        errEl.style.display = 'block';
                    }
                    return;
                }
                const data = await res.json();
                if (!data.success || !data.user || data.user.role !== 'admin') {
                    logout();
                    return;
                }
                localStorage.setItem('adminCurrentUser', JSON.stringify(data.user));
                token = localStorage.getItem('adminAuthToken');
                showApp();
            } catch (e) {
                logout();
            }
        }

        // Login
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('admin-login-username').value.trim().toLowerCase();
            const password = document.getElementById('admin-login-password').value;
            const errDiv = document.getElementById('admin-login-error');
            errDiv.style.display = 'none';
            try {
                const res = await fetch(`${SERVER}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                if (data.user.role !== 'admin') throw new Error('Accès réservé aux administrateurs');
                token = data.token;
                localStorage.setItem('adminAuthToken', data.token);
                localStorage.setItem('adminCurrentUser', JSON.stringify(data.user));
                showApp();
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
            }
        });

        document.getElementById('admin-logout-btn').addEventListener('click', logout);

        document.getElementById('admin-change-password-btn').addEventListener('click', async () => {
            const values = await modalPrompt('Changer le mot de passe admin', [
                { label: 'Mot de passe actuel', type: 'password', placeholder: '••••••••' },
                { label: 'Nouveau mot de passe (min. 6 caractères)', type: 'password', placeholder: '••••••••' }
            ]);
            if (!values || !values[0] || !values[1]) return;
            try {
                const res = await fetch(`${SERVER}/api/auth/change-password`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ current_password: values[0], new_password: values[1] })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showToast('Mot de passe administrateur mis à jour');
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        // Load users
        async function loadUsers() {
            const url = `${SERVER}/api/admin/users`;
            try {
                const res = await fetch(url, { headers: authHeaders() });
                if (handleSession401(res, url)) return;
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                users = data.users || [];
                renderUsers();
            } catch (err) {
                if (err.message !== 'Session expirée') showToast(err.message, 'error');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderUsers() {
            const tbody = document.getElementById('users-table-body');
            document.getElementById('user-count').textContent = users.length;
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${escapeHtml(u.full_name)}</strong></td>
                    <td>${escapeHtml(u.username)}</td>
                    <td><span class="role-badge role-${escapeAttr(u.role)}">${escapeHtml(formatRole(u.role))}</span></td>
                    <td>${escapeHtml(u.zone || '—')}</td>
                    <td class="${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? '✅ Actif' : '❌ Inactif'}</td>
                    <td>${u.last_login ? new Date(u.last_login).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—'}</td>
                    <td>
                        <button class="btn-sm btn-toggle" data-action="toggle" data-id="${escapeAttr(u._id)}" data-state="${!u.is_active}">${u.is_active ? 'Désactiver' : 'Activer'}</button>
                        <button class="btn-sm btn-edit" data-action="reset-pw" data-id="${escapeAttr(u._id)}" data-name="${escapeAttr(u.full_name)}">🔑</button>
                        <button class="btn-sm btn-del" data-action="delete" data-id="${escapeAttr(u._id)}" data-name="${escapeAttr(u.full_name)}">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        // Event delegation for user actions (instead of inline onclick)
        document.getElementById('users-table-body')?.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            if (action === 'toggle') adminToggle(id, btn.dataset.state === 'true');
            else if (action === 'reset-pw') adminResetPw(id, name);
            else if (action === 'delete') adminDelete(id, name);
        });

        function formatRole(r) {
            return { admin: 'Admin', group_pm: 'Group PM', program_manager: 'Program Manager', pm: 'PM', supervisor: 'Superviseur' }[r] || r;
        }

        // Create user
        document.getElementById('create-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                full_name: document.getElementById('new-full-name').value.trim(),
                username: document.getElementById('new-username').value.trim().toLowerCase(),
                password: document.getElementById('new-password').value,
                role: document.getElementById('new-role').value,
                zone: document.getElementById('new-zone').value
            };
            if (!payload.full_name || !payload.username || !payload.password || !payload.role) {
                showToast('Remplissez tous les champs obligatoires', 'error');
                return;
            }
            const btn = document.getElementById('btn-create-user');
            btn.disabled = true;
            try {
                const u = `${SERVER}/api/admin/users`;
                const res = await fetch(u, {
                    method: 'POST', headers: authHeaders(), body: JSON.stringify(payload)
                });
                if (handleSession401(res, u)) return;
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showToast(`Compte "${payload.full_name}" créé avec succès`);
                document.getElementById('create-user-form').reset();
                loadUsers();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        });

        // Toggle active
        async function adminToggle(id, newState) {
            try {
                const u = `${SERVER}/api/admin/users/${id}`;
                const res = await fetch(u, {
                    method: 'PUT', headers: authHeaders(),
                    body: JSON.stringify({ is_active: newState })
                });
                if (handleSession401(res, u)) return;
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showToast(`Compte ${newState ? 'activé' : 'désactivé'}`);
                loadUsers();
            } catch (err) {
                showToast(err.message, 'error');
            }
        };

        // Reset password
        async function adminResetPw(id, name) {
            const newPw = await modalPrompt(`Nouveau mot de passe pour ${name}`, [
                { label: 'Nouveau mot de passe', type: 'password', placeholder: 'Min 6 caractères' }
            ]);
            if (!newPw) return;
            try {
                const u = `${SERVER}/api/admin/users/${id}`;
                const res = await fetch(u, {
                    method: 'PUT', headers: authHeaders(),
                    body: JSON.stringify({ password: newPw })
                });
                if (handleSession401(res, u)) return;
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showToast(`Mot de passe de ${name} réinitialisé`);
            } catch (err) {
                showToast(err.message, 'error');
            }
        };

        // Delete
        async function adminDelete(id, name) {
            if (!confirm(`Supprimer définitivement le compte de ${name} ?`)) return;
            try {
                const u = `${SERVER}/api/admin/users/${id}`;
                const res = await fetch(u, {
                    method: 'DELETE', headers: authHeaders()
                });
                if (handleSession401(res, u)) return;
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showToast(`Compte ${name} supprimé`);
                loadUsers();
            } catch (err) {
                showToast(err.message, 'error');
            }
        };

        // Vérifier le token avant d'ouvrir l'admin (évite "token invalide" avec vieux jeton)
        if (token) tryRestoreSession();
    })();
    </script>
</body>
</html>
